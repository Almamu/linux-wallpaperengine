name: CMake

on:
  push:
    paths:
      - '.github/workflows/cmake.yml'
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeModules/**'
      - CMakeLists.txt
    branches: [ main ]
  pull_request:
    paths:
      - '.github/workflows/cmake.yml'
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeModules/**'
      - CMakeLists.txt
    branches: [ main ]
  workflow_dispatch:

jobs:
  formatting:
    name: Formatting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format style check for C/C++ programs.
        uses: jidicula/clang-format-action@v4.18.0
        with:
          check-path: "src"
          exclude-regex: "(src/External)"
      - run: echo "Formatted with clang-format version ${{ steps.clang-format.outputs.clang-format-version }}"

  tests:
    #needs: formatting
    env:
      BUILD_TYPE: Release

    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # cache some build information
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ matrix.os }}  # Eg. "some_build-ubuntu-latest"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get -y install libgl-dev libsdl2-dev liblz4-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libglm-dev libmpv-dev mpv libmpv2 libfftw3-dev

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_TESTING=1 -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        # build both tests and the wallpaperengine-webhelper as this includes a full build cycle
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target tests linux-wallpaperengine-webhelper

      - name: Run tests
        # Run the unit tests available
        run: ${{github.workspace}}/build/output/tests
